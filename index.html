<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안 하면 뭔가 이상한 앱</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-dim: #555555;
      --text-light: #9e9e9e;
      --accent: #dc143c; /* Crimson Red */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-light);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }

    h1 {
      font-size: 1.2rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
      text-align: center;
      letter-spacing: -1px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input {
      background-color: transparent;
      border: none;
      border-bottom: 1px solid var(--text-dim);
      color: var(--text-light);
      font-size: 1.5rem;
      padding: 0.5rem 0;
      font-family: inherit;
      outline: none;
      text-align: center;
      transition: border-color 0.3s;
    }

    input:focus {
      border-bottom-color: var(--accent);
    }

    input::placeholder {
      color: #333;
    }

    button {
      background-color: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      padding: 1rem;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    #result-box {
      margin-top: 3rem;
      opacity: 0;
      transition: opacity 0.5s;
      text-align: center;
    }

    #result-box.visible {
      opacity: 1;
    }

    .task {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .deadline {
      font-size: 1.5rem;
      color: var(--accent);
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    .loading {
      color: var(--accent);
      font-size: 0.9rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>[ 안 하면 뭔가 이상한 앱 ]</h1>
    
    <div class="input-group">
      <input type="text" id="categoryInput" placeholder="주제를 입력하세요" autocomplete="off">
      <button id="submitBtn">할당받기</button>
    </div>

    <div class="loading" id="loadingText">운명을 결정하는 중...</div>

    <div id="result-box">
      <div class="task" id="taskText"></div>
      <div class="deadline" id="deadlineText"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById('categoryInput');
    const button = document.getElementById('submitBtn');
    const resultBox = document.getElementById('result-box');
    const taskText = document.getElementById('taskText');
    const deadlineText = document.getElementById('deadlineText');
    const loadingText = document.getElementById('loadingText');

    button.addEventListener('click', async () => {
      const category = input.value.trim();
      if (!category) return;

      // 초기화 및 로딩 상태
      button.disabled = true;
      loadingText.style.display = 'block';
      resultBox.classList.remove('visible');

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ category })
        });

        const data = await response.json();

        if (response.ok) {
          taskText.textContent = `"${data.task}"`;
          deadlineText.textContent = data.deadline;
          resultBox.classList.add('visible');
        } else {
          taskText.textContent = data.error || "오류가 발생했습니다.";
          deadlineText.textContent = "";
          resultBox.classList.add('visible');
        }
      } catch (error) {
        taskText.textContent = "서버와 연결할 수 없습니다.";
        deadlineText.textContent = "";
        resultBox.classList.add('visible');
      } finally {
        button.disabled = false;
        loadingText.style.display = 'none';
      }
    });

    // 엔터키 지원
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        button.click();
      }
    });
  </script>
</body>
</html>
